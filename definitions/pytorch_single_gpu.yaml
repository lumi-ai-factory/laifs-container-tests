name: pytorch-single-gpu
tags: [pytorch, gpu, single-node]
description: PyTorch single-GPU training

job:
  - srun
  - --account={{ extra_args.account }}
  - --partition={{ extra_args.partition }}
  - --gpus-per-node=1
  - --ntasks-per-node=1
  - --cpus-per-task=7
  - --mem-per-gpu=60G
  - --time=00:30:00
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      source exec-env/bin/activate
      export DATADIR=$PWD/data

      cd applications/pytorch
      python3 visiontransformer.py
