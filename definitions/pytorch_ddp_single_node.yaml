name: pytorch-ddp-single-node
tags: [ddp, gpu, single-node]
description: PyTorch DDP single-node training

job:
  - srun
  - --account={{ extra_args.account }}
  - --partition={{ extra_args.partition }}
  - --time=00:15:00
  - --nodes=1
  - --gpus-per-node=2
  - --ntasks-per-node=1
  - --cpus-per-task=8
  - --mem-per-cpu=8G
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      # torchrun sets this if not already set, here we avoid the warning message
      export OMP_NUM_THREADS=1

      torchrun \
        --standalone \
        --nnodes=$SLURM_NNODES \
        --nproc_per_node=$SLURM_GPUS_PER_NODE \
        applications/pytorch/ddp_example.py
