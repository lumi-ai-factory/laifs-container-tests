name: pytorch-ddp-single-node
tags: [gpu, pytorch, multi-gpu, single-node]
description: PyTorch DDP single-node training

job:
  - srun
  - --account={{ extra_args.account }}
  - --partition={{ extra_args.partition }}
  - --nodes=1
  - --gpus-per-node=8
  - --ntasks-per-node=1
  - --cpus-per-task=56
  - --mem-per-gpu=60G
  - --time=00:30:00
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      source exec-env/bin/activate
      export DATADIR=$PWD/data

      # torchrun sets this if not already set, here we avoid the warning message
      export OMP_NUM_THREADS=1

      cd applications/pytorch

      python3 -m torch.distributed.run \
        --standalone \
        --nnodes=$SLURM_NNODES \
        --nproc_per_node=$SLURM_GPUS_PER_NODE \
        ddp_visiontransformer.py
