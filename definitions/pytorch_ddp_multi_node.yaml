name: pytorch-ddp-multi-node
tags: [ddp, gpu, multi-node]
description: PyTorch DDP multi-node training

job:
  - srun
  - --account {{ extra_args.account }}
  - --partition {{ extra_args.partition }}
  - --time 00:15:00
  - --nodes 2
  - --gpus-per-node 2
  - --ntasks-per-node 1
  - --cpus-per-task 16
  - --mem-per-cpu 8G
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      # torchrun sets this if not already set, here we avoid the warning message
      export OMP_NUM_THREADS=1

      # This would be cleaner with scontrol, but it is not in the container
      RDZV_HOST="nid""$(echo $SLURM_JOB_NODELIST | grep -Eo [0-9]+ | head -n 1)"
      # Set rendezvous port using job ID, as the default port is likely in use
      RDZV_PORT="1""${SLURM_JOB_ID:0-4}"

      RDZV_ENDPOINT=$RDZV_HOST:$RDZV_PORT
      echo RDZV_ENDPOINT=$RDZV_ENDPOINT

      torchrun \
        --nnodes=$SLURM_NNODES \
        --nproc_per_node=$SLURM_GPUS_PER_NODE \
        --rdzv-id=$SLURM_JOB_ID \
        --rdzv-backend=c10d \
        --rdzv-endpoint=$RDZV_ENDPOINT \
        applications/pytorch/ddp_example.py
