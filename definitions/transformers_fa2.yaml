name: transformers-fa2
tags: [transformers, flash-attention]
description: Transformers with FA2 attention

job:
  - srun
  - --account={{ extra_args.account }}
  - --partition={{ extra_args.partition }}
  - --gpus-per-node=1
  - --ntasks-per-node=1
  - --cpus-per-task=7
  - --mem-per-gpu=60G
  - --time=00:30:00
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      source exec-env/bin/activate

      export DATADIR=$PWD/data
      export HF_HOME=$DATADIR/huggingface

      cd applications/transformers

      python3 run_benchmarks.py \
          --output-dir=$DATADIR/transformers/benchmark_results \
          --model-id=LumiOpen/Llama-Poro-2-8B-base \
          --batch-size=1 \
          --sequence-length=128 \
          --num-tokens-to-generate=128 \
          --config-file=config/fa2.json \
          --commit-id=556312c
