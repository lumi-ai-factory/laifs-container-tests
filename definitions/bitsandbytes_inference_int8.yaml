name: bitsandbytes_inference_int8
tags: [bitsandbytes, inference]
description: BitsAndBytes inference with INT8 quantization

job:
  - srun
  - --account={{ extra_args.account }}
  - --partition={{ extra_args.partition }}
  - --gpus-per-node=1
  - --ntasks-per-node=1
  - --cpus-per-task=7
  - --mem-per-gpu=60G
  - --time=00:30:00
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      source .virtualenvs/$(basename $SINGULARITY_NAME .sif)/bin/activate

      export DATADIR=$PWD/data
      export HF_HOME=$DATADIR/huggingface

      cd applications/bitsandbytes

      python3 inference_benchmark.py \
        LumiOpen/Llama-Poro-2-8B-base \
        --configs int8 \
        --batches=8 \
        --out-dir=$DATADIR/bitsandbytes/reports \
        --iterations=1 \
        --warmup-runs=0 \

parse: |
  def parse(text, params):
      import json

      data = None
      for line in text.splitlines()[::-1]:
          try:
              data = json.loads(line)
              break
          except:
              continue

      if data:
          return {
              "load_model_latency": {
                  "value": data["load_model"]["latency"]["mean"],
                  "unit": data["load_model"]["latency"]["unit"],
              },
              "generate_throughput": {
                  "value": data["generate"]["throughput"]["value"],
                  "unit": data["generate"]["throughput"]["unit"],
              },
              "prefill_throughput": {
                  "value": data["prefill"]["throughput"]["value"],
                  "unit": data["prefill"]["throughput"]["unit"],
              },
              "decode_throughput": {
                  "value": data["decode"]["throughput"]["value"],
                  "unit": data["decode"]["throughput"]["unit"],
              },
              "per_token_latency": {
                  "value": data["per_token"]["latency"]["mean"],
                  "unit": data["per_token"]["latency"]["unit"],
              },
          }

validate: |
  def validate(results, params):
      import json

      if not results:
          return (False, "no results to validate")

      limits = {
          "load_model_latency": {"type": "max", "unit": "s", "value": 60.0},
          "generate_throughput": {"type": "min", "unit": "samples/s", "value": 50.0},
          "prefill_throughput": {"type": "min", "unit": "samples/s", "value": 2.5},
          "decode_throughput": {"type": "min", "unit": "samples/s", "value": 75},
          "per_token_latency": {"type": "max", "unit": "s", "value": 1.0},
      }

      all_ok = True
      validate_res = {}

      for metric, limit in limits.items():
          res = results[metric]
          ok = True

          if (
              limit["type"] == "max" and res["value"] > limit["value"]
              or limit["type"] == "min" and res["value"] < limit["value"]
          ):
              ok = False
              all_ok = False

          validate_res[metric] = {
              "limit": f"{round(limit['value'], 2)}{limit['unit']} ({limit['type']})",
              "value": f"{round(res['value'], 2)}{res['unit']}",
              "status": "pass" if ok else "fail",
          }

      return (all_ok, json.dumps(validate_res))
