name: pytorch-ddp-singlenode-srun
tags: [pytorch, ddp, training, multi-gpu, release]
description: PyTorch single-node training using Distributed Data Parallel

job:
  - srun
  - --nodes=1
  - --gpus-per-node=8
  - --ntasks-per-node=1
  - --cpus-per-task=56
  - --time=00:30:00
  - singularity
  - run
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      # Avoid error mentioned in https://github.com/pytorch/pytorch/issues/60477
      export TMPDIR=$(mktemp -d)

      # This would be cleaner with scontrol, but it is not available in the container
      export MASTER_ADDR="nid$(echo $SLURM_STEP_NODELIST | grep -Eo [0-9]+ | head -n 1)"
      # Set master port using job ID, as the default port may be in use
      export MASTER_PORT="1${SLURM_JOB_ID:0-4}"

      export RANK=$SLURM_PROCID
      export LOCAL_RANK=$SLURM_LOCALID
      export WORLD_SIZE=$SLURM_NTASKS
      export LOCAL_WORLD_SIZE=$SLURM_GPUS_PER_NODE

      source .virtualenvs/$(basename $SINGULARITY_NAME .sif)/bin/activate

      cd benchmarks/pytorch

      python3 ddp_visiontransformer.py

parse: |
  def parse(text, params):
      import re
      from statistics import mean

      results = {
          "loss_avg": {
              "pattern": r"Loss: (\d+\.\d+)",
              "values": [],
          },
          "acc_avg": {
              "pattern": r"Accuracy: (\d+\.\d+)",
              "values": [],
          },
          "time_avg": {
              "pattern": r"Time: (\d+\.\d+)",
              "values": [],
          },
      }

      for key, val in results.items():
          results[key]["values"] = [
              float(s) for s in re.findall(val["pattern"], text)
          ]

      return {k: mean(v["values"]) for k, v in results.items()}

validate: |
  def validate(results, params):
      import json

      if not results:
          return (False, "no results to validate")

      limits = {
          "loss_avg": {"type": "max", "unit": "", "value": 5.0},
          "acc_avg": {"type": "min", "unit": "%", "value": 5.0},
          "time_avg": {"type": "max", "unit": "s", "value": 60.0},
      }

      all_ok = True
      validate_res = {}

      for metric, limit in limits.items():
          res = results[metric]
          ok = True

          if (
              limit["type"] == "max" and res > limit["value"]
              or limit["type"] == "min" and res < limit["value"]
          ):
              ok = False
              all_ok = False

          validate_res[metric] = {
              "limit": f"{round(limit['value'], 2)} {limit['unit']}".strip() + f" ({limit['type']})",
              "value": f"{round(res, 2)} {limit['unit']}".strip(),
              "status": "pass" if ok else "fail",
          }

      return (all_ok, "results:\n```\n" + json.dumps(validate_res, indent=4) + "\n```")
