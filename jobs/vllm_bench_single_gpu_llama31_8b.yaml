name: vllm-bench-single-gpu-llama31-8b
tags: [vllm, vllm_8b, release]
description: |
  vLLM throughput benchmark using single MI250x GPU and unquantized Llama-3.1-8B
  model. This test runs "vllm bench throughput" with 1000 prompts and checks input
  token processing and output token generation speeds against reference values.

job:
  - srun
  - --account {{ extra_args.account }}
  - --partition {{ extra_args.partition }}
  - --time 00:15:00
  - --tasks 1
  - --gpus-per-task 1
  - --cpus-per-task 4
  - singularity
  - run
  - --env MAP_HIP_TO_ROCR_VISIBLE_DEVICES=1
  - -B /pfs
  - -B /users
  - -B /scratch
  - -B /projappl
  - "{{ extra_args.sif }}"
  - bash -c
  - "{{ snippet.script }}"

snippets:
  - name: script
    content: |
      export HF_HOME=$PWD/data/huggingface
      export TORCH_COMPILE_DISABLE=1

      vllm bench throughput \
          --num-prompts 1000 \
          --random-input-len 256 \
          --output-len 512 \
          --max-num-seqs 500 \
          --model unsloth/Meta-Llama-3.1-8B \
          --dataset-name random
parse: |
  def parse(text, params):
      import re

      m = re.search(r"Throughput:\s*[\d.]+\s*requests/s,\s*([\d.]+)\s*total tokens/s,\s*([\d.]+)\s*output tokens/s", text)
      return {
          "total_tokens_per_s": float(m.group(1)) if m else None,
          "output_tokens_per_s": float(m.group(2)) if m else None,
      }

validate: |
  def validate(results, params):
      tot = results.get("total_tokens_per_s")
      out = results.get("output_tokens_per_s")

      if tot is None:
          return (False, "no total tokens/s parsed")
      if out is None:
          return (False, "no output tokens/s parsed")

      min_tot = 3000
      min_out = 1500

      ok = (tot >= min_tot) and (out >= min_out)
      msg = "min_total={} got {:.2f}; min_output={} got {:.2f}".format(min_tot, tot, min_out, out)

      return (ok, msg)

